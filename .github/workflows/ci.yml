name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Editor/package-lock.json
      - name: Install XcodeGen
        run: |
          curl -fsSL -o "$RUNNER_TEMP/xcodegen.zip" \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip
          echo "090ec29491aad50aec10631bf6e62253fed733c50f3aab0f5ffc86bc170bdbef  $RUNNER_TEMP/xcodegen.zip" \
            | shasum -a 256 -c -
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"
      - name: Bootstrap
        run: ./scripts/bootstrap.sh
      - name: Editor tests
        working-directory: Editor
        run: npm test
      - name: Swift tests
        run: xcodebuild test -project PaperMD.xcodeproj -scheme PaperMD -destination 'platform=macOS,arch=arm64' CODE_SIGNING_ALLOWED=NO
